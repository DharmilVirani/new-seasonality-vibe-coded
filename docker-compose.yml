# Seasonality SaaS - Docker Compose Configuration
# Optimized for Ubuntu Desktop (8-16GB RAM)

version: '3.9'

services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:2.15.1-pg16
    container_name: seasonality-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seasonality}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seasonality123}
      POSTGRES_DB: ${POSTGRES_DB:-seasonality}
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAINTENANCE_WORK_MEM: 128MB
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_WORKER_PROCESSES: 4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seasonality} -d ${POSTGRES_DB:-seasonality}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - seasonality-net

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: seasonality-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --save 900 1 --save 300 10 --timeout 0
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - seasonality-net

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    container_name: seasonality-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-admin12345}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - seasonality-net

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: seasonality-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seasonality}:${POSTGRES_PASSWORD:-seasonality123}@postgres:5432/${POSTGRES_DB:-seasonality}?connection_limit=20&pool_timeout=10
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-admin12345}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: seasonality-uploads
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-your-super-secure-jwt-secret}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      CORS_ORIGIN: "*"
      DB_POOL_SIZE: 20
      WORKER_CONCURRENCY: 2
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seasonality-net

  # Background Worker for CSV processing
  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: seasonality-worker
    command: node src/jobs/worker.js
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seasonality}:${POSTGRES_PASSWORD:-seasonality123}@postgres:5432/${POSTGRES_DB:-seasonality}?connection_limit=5
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-admin12345}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: seasonality-uploads
      NODE_ENV: production
      WORKER_CONCURRENCY: 2
      DB_BATCH_SIZE: 1000
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - seasonality-net

  # Frontend
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: seasonality-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_MINIO_ENDPOINT: http://localhost:9000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - seasonality-net

networks:
  seasonality-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
